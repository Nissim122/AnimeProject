<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#0f0f1a"/>
  <!-- Anime eyes -->
  <ellipse cx="11" cy="15" rx="4.5" ry="5.5" fill="#e0176b"/>
  <ellipse cx="21" cy="15" rx="4.5" ry="5.5" fill="#e0176b"/>
  <ellipse cx="11" cy="15.5" rx="2.8" ry="3.5" fill="#0a0010"/>
  <ellipse cx="21" cy="15.5" rx="2.8" ry="3.5" fill="#0a0010"/>
  <!-- Eye shine -->
  <circle cx="9.8" cy="13.5" r="1.1" fill="white"/>
  <circle cx="19.8" cy="13.5" r="1.1" fill="white"/>
  <!-- Small shine -->
  <circle cx="12.2" cy="16.5" r="0.6" fill="white" opacity="0.7"/>
  <circle cx="22.2" cy="16.5" r="0.6" fill="white" opacity="0.7"/>
  <!-- Blush marks -->
  <ellipse cx="7" cy="19" rx="2.2" ry="1" fill="#e0176b" opacity="0.5"/>
  <ellipse cx="25" cy="19" rx="2.2" ry="1" fill="#e0176b" opacity="0.5"/>
  <!-- Small smile -->
  <path d="M13 22 Q16 24.5 19 22" stroke="#e0176b" stroke-width="1.2" stroke-linecap="round" fill="none"/>
</svg>
